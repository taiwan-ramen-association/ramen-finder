<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/icons/03.png">
<title>台灣拉麵協會</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', -apple-system, sans-serif;
    background: #faf7f2; color: #1a1209; min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }
  #gate {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 16px;
  }
  #gate p { color: #8a7d6e; font-size: 14px; }
  .btn-google {
    display: flex; align-items: center; gap: 8px;
    background: #ffffff; border: 1px solid #e8e0d4;
    padding: 10px 20px; border-radius: 8px;
    font-size: 14px; cursor: pointer; color: #1a1209;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1); font-family: inherit;
  }
  .btn-google:hover { background: #fdf5f5; }
  .btn-google svg { width: 18px; height: 18px; }
  #retryBtn {
    display: none; margin-top: 4px;
    background: none; border: 1px solid #e8e0d4;
    padding: 8px 18px; border-radius: 8px;
    font-size: 13px; cursor: pointer; color: #8a7d6e;
    font-family: inherit;
  }
  #retryBtn:hover { background: #fdf5f5; color: #1a1209; }
</style>
</head>
<body>

<div id="gate">
  <p id="gateMsg">驗證中…</p>
  <button class="btn-google" id="loginBtn" style="display:none">
    <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.4 30.2 0 24 0 14.7 0 6.8 5.4 3 13.3l7.8 6C12.7 13.2 17.9 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 6.9-10.1 6.9-17z"/><path fill="#FBBC05" d="M10.8 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.7-4.7L2.4 13.3A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.4 10.6l8.4-5.9z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.1 0-11.3-3.7-13.2-9l-7.8 6C6.8 42.6 14.7 48 24 48z"/></svg>
    以 Google 帳號登入
  </button>
  <button id="retryBtn">重試</button>
</div>

<script>
const BUNDLE_URL = 'https://api.github.com/repos/taiwan-ramen-association/ramen-finder-notes/contents/admin-bundle.js';

const firebaseConfig = {
  apiKey: "AIzaSyBdN0AYZMM2AU66QcH4BVNJHx1plwQBBYc",
  authDomain: "taiwan-ramen-association.firebaseapp.com",
  projectId: "taiwan-ramen-association",
  storageBucket: "taiwan-ramen-association.firebasestorage.app",
  messagingSenderId: "66234065738",
  appId: "1:66234065738:web:eb9fc4348a942da66ad7b3"
};
firebase.initializeApp(firebaseConfig);
const _auth     = firebase.auth();
const _db       = firebase.firestore();
const _storage  = firebase.storage();
const _provider = new firebase.auth.GoogleAuthProvider();

const gate     = document.getElementById('gate');
const gateMsg  = document.getElementById('gateMsg');
const loginBtn = document.getElementById('loginBtn');
const retryBtn = document.getElementById('retryBtn');

loginBtn.addEventListener('click', () => {
  _auth.signInWithPopup(_provider).catch(console.error);
});

retryBtn.addEventListener('click', () => {
  retryBtn.style.display = 'none';
  loadBundle();
});

let _adminUser = null;

async function loadBundle() {
  gateMsg.textContent = '載入管理介面…';
  try {
    // 從 Firestore 讀取 GitHub PAT（admin-only）
    const cfgSnap = await _db.collection('meta').doc('githubConfig').get();
    if (!cfgSnap.exists || !cfgSnap.data().pat) {
      throw new Error('GitHub 設定未配置，請聯絡系統管理員');
    }
    const pat = cfgSnap.data().pat;

    // 從 GitHub Contents API 拉取 bundle（支援 CORS，raw endpoint 不支援）
    const res = await fetch(BUNDLE_URL, {
      headers: {
        'Authorization': `token ${pat}`,
        'Accept': 'application/vnd.github.v3.raw'
      },
      cache: 'no-cache'
    });
    if (!res.ok) throw new Error(`GitHub 回應 ${res.status}，請確認 PAT 是否有效`);
    const code = await res.text();

    // 透過 Blob URL 注入
    const blob    = new Blob([code], { type: 'application/javascript' });
    const blobUrl = URL.createObjectURL(blob);
    gate.style.display = 'none';
    const script = document.createElement('script');
    script.src = blobUrl;
    script.onload  = () => URL.revokeObjectURL(blobUrl);
    script.onerror = () => {
      URL.revokeObjectURL(blobUrl);
      gate.style.display = 'flex';
      gateMsg.textContent = '❌ 介面執行失敗，請重新整理';
    };
    document.head.appendChild(script);
  } catch (e) {
    gate.style.display = 'flex';
    gateMsg.textContent = '❌ 載入失敗：' + e.message;
    retryBtn.style.display = 'block';
  }
}

_auth.onAuthStateChanged(async user => {
  if (!user) {
    gateMsg.textContent = '請以管理員 Google 帳號登入';
    loginBtn.style.display = 'flex';
    retryBtn.style.display = 'none';
    gate.style.display = 'flex';
    return;
  }

  loginBtn.style.display = 'none';
  retryBtn.style.display = 'none';
  gateMsg.textContent = '驗證中…';

  const snap = await _db.collection('users').doc(user.uid).get();
  const data  = snap.data();

  if (!data || data.role !== 'admin') {
    gateMsg.textContent = `⛔ 權限不足（${user.email}）`;
    gate.style.display = 'flex';
    return;
  }

  _adminUser = user;
  loadBundle();
});
</script>
</body>
</html>
