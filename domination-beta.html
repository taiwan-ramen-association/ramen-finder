<html lang="zh-TW">
<head>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #C8272D; --red-dark: #9b1e23;
  --ink: #1a1209; --paper: #faf7f2;
  --stone: #8a7d6e; --line: #e8e0d4; --white: #ffffff;
}
body { font-family: 'Noto Sans TC', -apple-system, sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

header {
  background: var(--red); color: var(--white);
  padding: 13px 20px; display: flex; align-items: center;
  justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
header a { color: var(--white); font-size: 13px; text-decoration: none; opacity: 0.85; }
header a:hover { opacity: 1; }

/* Gate */
#gate {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 70vh; gap: 14px;
}
#gate p { color: var(--stone); font-size: 14px; }
.btn-google {
  display: flex; align-items: center; gap: 8px;
  background: var(--white); border: 1px solid var(--line);
  padding: 10px 20px; border-radius: 8px;
  font-size: 14px; cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.btn-google:hover { background: #f5f5f5; }

/* App */
#app { display: none; max-width: 900px; margin: 0 auto; padding: 16px; }

/* Stats bar */
.stats-bar {
  display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
}
.stat-card {
  flex: 1; min-width: 120px;
  background: var(--white); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px; text-align: center;
}
.stat-card .val {
  font-size: 24px; font-weight: 800; color: var(--red); line-height: 1;
}
.stat-card .lbl { font-size: 11px; color: var(--stone); margin-top: 4px; }

/* Map */
#mapWrap {
  background: var(--white); border: 1px solid var(--line);
  border-radius: 14px; overflow: hidden; margin-bottom: 14px;
  position: relative;
}
#mapSvg { width: 100%; height: auto; display: block; }
.town-path:hover { opacity: 0.75; stroke: #333; stroke-width: 1; }

/* Tooltip */
#tooltip {
  position: fixed; pointer-events: none; z-index: 500;
  background: rgba(20,10,5,0.88); color: #fff;
  padding: 8px 12px; border-radius: 9px; font-size: 12px;
  line-height: 1.6; max-width: 200px; display: none;
}
#tooltip .tt-name { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
#tooltip .tt-score { color: #ffc; }

/* Legend */
.legend {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; background: var(--white);
  border: 1px solid var(--line); border-radius: 12px;
  font-size: 12px; color: var(--stone); flex-wrap: wrap;
}
.legend-title { font-weight: 600; color: var(--ink); margin-right: 4px; }
.legend-grad {
  flex: 1; min-width: 120px; height: 12px; border-radius: 6px;
  background: linear-gradient(to right, #ffeeee, #7b1010);
}
.legend-labels { display: flex; justify-content: space-between; font-size: 10px; width: 100%; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

/* Loading progress */
#loadingMsg {
  display: flex; align-items: center; justify-content: center;
  padding: 60px 20px; min-height: 280px;
  transition: opacity 0.3s ease;
}
#loadingMsg.fade-out { opacity: 0; }
.ld-wrap { width: 100%; max-width: 300px; text-align: center; }
.ld-icon { font-size: 32px; margin-bottom: 10px; }
.ld-label { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 14px; }
.ld-text { font-size: 13px; color: var(--stone); margin-bottom: 10px; min-height: 18px; }
.ld-track { width: 100%; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
.ld-fill { height: 100%; width: 0%; background: var(--red); border-radius: 3px; transition: width 0.2s ease; }
.ld-pct { font-size: 11px; color: var(--stone); }

/* Zoom */
#mapSvg { touch-action: none; cursor: grab; }
#mapSvg:active { cursor: grabbing; }
.town-path { stroke: #fff; stroke-width: 0.4; cursor: pointer; transition: opacity 0.12s; }

/* Reset zoom button */
#resetZoomBtn {
  position: absolute; top: 10px; right: 10px; z-index: 10;
  width: 34px; height: 34px; border-radius: 8px;
  background: rgba(255,255,255,0.92); border: 1px solid var(--line);
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  cursor: pointer; font-size: 18px; display: none;
  align-items: center; justify-content: center;
  transition: background 0.15s;
}
#resetZoomBtn:hover { background: #fff; }

/* Mobile bottom info panel */
#infoPanel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  background: var(--white); border-radius: 18px 18px 0 0;
  padding: 20px 20px 32px;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  transform: translateY(100%); transition: transform 0.3s ease;
  display: none;
}
#infoPanel.open { transform: translateY(0); }
#infoPanelClose {
  position: absolute; top: 12px; right: 16px;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--line); border: none; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  color: var(--stone);
}
#infoPanelName { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: var(--ink); }
#infoPanelShops { font-size: 13px; color: var(--stone); margin-bottom: 4px; }
#infoPanelScore { font-size: 13px; color: var(--red); font-weight: 600; }
#infoPanelHint { font-size: 11px; color: var(--stone); margin-top: 10px; opacity: 0.7; }

/* Desktop: hide panel, mobile: hide tooltip */
@media (pointer: fine) { #infoPanel { display: none !important; } }
@media (pointer: coarse) { #tooltip { display: none !important; } }
</style>
</head>
<body>

<script>
// ── GeoJSON 快取設定 ──────────────────────────────────────────────────────────
// 需要強制使用者重新下載地圖資料時（行政區劃修正等），改版號即可清除舊快取
const GEO_CACHE_NAME = 'dom-geo-v1';
const GEO_URLS = [
  'https://cdn.jsdelivr.net/gh/g0v/twgeojson@master/json/twTown2010.geo.json',
  'https://cdn.jsdelivr.net/gh/g0v/twgeojson@master/json/twTown1982.geo.json',
];

// ── 載入進度條 ────────────────────────────────────────────────────────────────
// 各資源進度佔比：data.json 10% + districts 5% + userVisits 20% + GeoJSON 60% = 95%
// 最後 setProgress(100) 補足剩餘 5%
let _prog = 0;
function setProgress(pct, text) {
  _prog = Math.min(100, Math.max(_prog, pct));
  document.getElementById('ldFill').style.width = _prog + '%';
  document.getElementById('ldPct').textContent = Math.round(_prog) + '%';
  if (text) document.getElementById('ldText').textContent = text;
}
function addProgress(delta, text) { setProgress(_prog + delta, text); }

// ── GeoJSON 取得（快取優先，串流追蹤進度）────────────────────────────────────
async function fetchGeoJSON() {
  const cache = await caches.open(GEO_CACHE_NAME);

  // ① 快取命中 → 直接回傳，加上等同串流的進度量
  for (const url of GEO_URLS) {
    const hit = await cache.match(url);
    if (hit) { addProgress(60, '讀取快取地圖資料…'); return hit.json(); }
  }

  // ② 依序嘗試 CDN，串流讀取並追蹤進度
  let lastErr;
  for (const url of GEO_URLS) {
    try { return await _streamGeo(url, cache); }
    catch (e) { lastErr = e; }
  }
  throw lastErr;
}

async function _streamGeo(url, cache) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);

  const contentLength = res.headers.get('Content-Length');
  const total = contentLength ? parseInt(contentLength) : 0;
  const reader = res.body.getReader();
  const chunks = [];
  let received = 0, geoContrib = 0;
  const GEO_WEIGHT = 60;

  let fakeTimer = null;
  if (!total) {
    // CDN 回 gzip 時無 Content-Length → 模擬平滑進度
    fakeTimer = setInterval(() => {
      const inc = Math.min((GEO_WEIGHT - geoContrib) * 0.03, GEO_WEIGHT - geoContrib - 1);
      if (inc > 0.1) { addProgress(inc, '下載地圖資料…'); geoContrib += inc; }
    }, 180);
  }

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;
    if (total) {
      const contrib = (received / total) * GEO_WEIGHT;
      const delta = contrib - geoContrib;
      if (delta > 0) { addProgress(delta, '下載地圖資料…'); geoContrib = contrib; }
    }
  }

  if (fakeTimer) clearInterval(fakeTimer);
  const remaining = GEO_WEIGHT - geoContrib;
  if (remaining > 0) addProgress(remaining, '處理地圖資料…');

  // Uint8Array 合併 → JSON
  const totalBytes = chunks.reduce((s, c) => s + c.length, 0);
  const buf = new Uint8Array(totalBytes);
  let off = 0;
  for (const c of chunks) { buf.set(c, off); off += c.length; }
  const text = new TextDecoder().decode(buf);
  const json = JSON.parse(text);

  // 存入快取（下次瞬間讀取）
  cache.put(url, new Response(text, { headers: { 'Content-Type': 'application/json' } }));
  return json;
}

// ─────────────────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBdN0AYZMM2AU66QcH4BVNJHx1plwQBBYc",
  authDomain: "taiwan-ramen-association.firebaseapp.com",
  projectId: "taiwan-ramen-association",
  storageBucket: "taiwan-ramen-association.firebasestorage.app",
  messagingSenderId: "66234065738",
  appId: "1:66234065738:web:eb9fc4348a942da66ad7b3"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db   = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

const norm = s => (s || '').replace(/台/g, '臺').trim();

// ── 行政區劃改制（縣市改名，共 5 筆）──────────────────────────────────────
// 鄉鎮市區名稱改制由 districts.json 動態推導，不寫死
const _COUNTY_RENAME = {
  '臺北縣': '新北市',
  '桃園縣': '桃園市',
  '臺中縣': '臺中市',
  '臺南縣': '臺南市',
  '高雄縣': '高雄市',
};

// 由 districts.json 建立的查詢結構：{ county → { set, baseMap } }
// set：現行名稱 Set（快速確認是否已是正確名稱）
// baseMap：字根 → 現行名稱（用於舊名推導，不限定改成「區」）
let _districtSets = {};

function initDistrictSets(districtsData) {
  _districtSets = {};
  for (const [county, dists] of Object.entries(districtsData)) {
    const c   = norm(county);
    const set = new Set(dists.map(norm));
    const baseMap = {};
    for (const d of set) {
      if (/[鄉鎮市區]$/.test(d)) baseMap[d.slice(0, -1)] = d;
    }
    _districtSets[c] = { set, baseMap };
  }
}

function normGeo(countyRaw, townRaw) {
  let county = norm(countyRaw);
  let town   = norm(townRaw);
  // 縣市改名
  county = _COUNTY_RENAME[county] || county;
  // 行政區改名：若現行名稱 Set 中找不到，以字根在 baseMap 中查新名
  // 例：湖口鄉→湖口鎮、龍潭鄉→龍潭區、板橋市→板橋區
  const info = _districtSets[county];
  if (info && !info.set.has(town) && /[鄉鎮市區]$/.test(town)) {
    const match = info.baseMap[town.slice(0, -1)];
    if (match) town = match;
  }
  return county + '_' + town;
}


// ===== ✅ 新：狀態 → 分數（不顯示）=====
function scoreFromStatus(status) {
  if (!status) return 0;
  if (status === 0.2) return 0.2;
  if (status === 1) return 1;
  if (status >= 2 && status <= 10) return status;
  if (status > 10 && status < 20) return 10;
  if (status === 20) return 20;
  return 0;
}


// ===== ✅ 新：Firestore 更新（支援心得）=====
async function updateVisit(uid, shopId, status, note = '') {
  const ref = db.collection('userVisits').doc(uid);

  await ref.set({
    visits: {
      [shopId]: {
        status,
        note: note.substring(0, 200), // 限制字數
        updatedAt: new Date()
      }
    }
  }, { merge: true });
}


// ===== 登入 =====
document.getElementById('loginBtn').addEventListener('click', () => {
  auth.signInWithPopup(provider).catch(err => {
    if (err.code === 'auth/popup-blocked') auth.signInWithRedirect(provider);
    else if (err.code !== 'auth/popup-closed-by-user') console.error(err);
  });
});


auth.onAuthStateChanged(async user => {
  const gate = document.getElementById('gate');
  const app  = document.getElementById('app');

  if (!user) {
    document.getElementById('gateMsg').textContent = '請登入後查看制霸地圖';
    document.getElementById('loginBtn').style.display = 'flex';
    gate.style.display = 'flex';
    app.style.display  = 'none';
    return;
  }

  gate.style.display = 'none';
  app.style.display  = 'block';
  await loadAll(user.uid);
});


// ===== 主載入 =====
async function loadAll(uid) {
  _prog = 0;
  setProgress(0, '初始化中…');
  try {
    const [shopsRes, visitsSnap, geoRes, districtsRes] = await Promise.all([
      fetch('data/data.json').then(r => r.json())
        .then(d => { addProgress(10, '店家資料已載入'); return d; }),
      db.collection('userVisits').doc(uid).get()
        .then(d => { addProgress(20, '踩點記錄已載入'); return d; }),
      fetchGeoJSON(),
      fetch('data/districts.json').then(r => r.json())
        .then(d => { addProgress(5, '地區資料已載入'); return d; }),
    ]);
    initDistrictSets(districtsRes);

    const visits = visitsSnap.exists ? (visitsSnap.data().visits || {}) : {};

    // ===== 建立鄉鎮 index =====
    // shopsByTown：只含營業中（地圖著色、完全制霸用）
    // allShopIds / allShopsByTown：所有狀態（制霸總分、已踩點、已涉足鄉鎮用）
    const allShopIds = new Set();
    const allShopsByTown = {};
    const shopsByTown = {};
    for (const shop of shopsRes) {
      const id  = shop['ID'];
      const key = norm(shop['縣市']) + '_' + norm(shop['鄉鎮市區']);
      allShopIds.add(id);
      if (!allShopsByTown[key]) allShopsByTown[key] = [];
      allShopsByTown[key].push(id);
      if (shop['營業狀態'] === '營業中') {
        if (!shopsByTown[key]) shopsByTown[key] = [];
        shopsByTown[key].push(id);
      }
    }
    const totalTownsWithShops = Object.keys(shopsByTown).length;

    // ===== 鄉鎮統計 =====
    function townStats(key) {
      const ids = shopsByTown[key] || [];       // 營業中店家（地圖、完全制霸）
      const allIds = allShopsByTown[key] || []; // 所有狀態（已涉足判斷）
      let score = 0;
      let visitedCount = 0; // 吃過一次以上（含從業）的営業中店數

      for (const id of ids) {
        const s = visits[id];
        if (s != null && s > 0) {
          if (s >= 1 || s === 20) visitedCount++;
          if (s === 20) continue; // 從業不計入累積分數
          score += scoreFromStatus(s);
        }
      }

      // hasVisit：該鄉鎮任一店家（含非現存）有踩點即算涉足
      const hasVisit = allIds.some(id => { const s = visits[id]; return s != null && (s >= 1 || s === 20); });

      return {
        count: ids.length,
        score,
        max: ids.length * 10,
        hasVisit,
        visitedCount
      };
    }


    // ===== 全域統計（含所有狀態店家）=====
    let totalScore = 0, stampedShops = 0;

    for (const [shopId, s] of Object.entries(visits)) {
      if (!allShopIds.has(shopId)) continue;
      totalScore += scoreFromStatus(s);
      if (s >= 1 || s === 20) stampedShops++;
    }

    document.getElementById('statScore').textContent = Math.round(totalScore * 10) / 10;
    document.getElementById('statShops').textContent = stampedShops;


    // ===== 畫地圖 =====
    renderMap(geoRes, shopsByTown, visits, townStats, stats => {
      document.getElementById('statTowns').textContent = stats.visitedTowns;
      document.getElementById('statFull').textContent  = stats.fullTowns + '/' + totalTownsWithShops;
    });

    setProgress(100, '完成！');
    const ldMsg = document.getElementById('loadingMsg');
    ldMsg.classList.add('fade-out');
    setTimeout(() => {
      ldMsg.style.display = 'none';
      document.getElementById('statsBar').style.display  = 'flex';
      document.getElementById('mapWrap').style.display   = 'block';
      document.getElementById('legendBox').style.display = 'flex';
    }, 300);

  } catch (e) {
    const ldMsg = document.getElementById('loadingMsg');
    ldMsg.innerHTML = `<div class="ld-wrap"><div class="ld-icon">⚠️</div><div class="ld-label" style="color:var(--red)">地圖載入失敗</div><div class="ld-text">${e.message}</div></div>`;
    console.error(e);
  }
}


// ===== 顏色 =====
function getFill(count, score, max) {
  if (count === 0) return '#cccccc';
  if (score === 0) return '#fff0f0';

  const ratio = score / max;
  return d3.interpolateRgb('#ffcccc', '#7b1010')(ratio);
}


// ===== 地圖渲染 =====
function renderMap(geo, shopsByTown, visits, townStats, cb) {
  const svg = d3.select('#mapSvg');
  const W = 600, H = 700;

  const projection = d3.geoMercator()
    .center([121, 23.6])
    .scale(W * 11.5)
    .translate([W / 2, H / 2]);

  const path = d3.geoPath().projection(projection);
  const tip      = document.getElementById('tooltip');
  const panel    = document.getElementById('infoPanel');
  const resetBtn = document.getElementById('resetZoomBtn');
  const isMobile = window.matchMedia('(pointer: coarse)').matches;

  // 行動版：初始化 infoPanel
  if (isMobile) panel.style.display = 'block';

  let visitedTowns = 0, fullTowns = 0;

  // paths 包在 <g> 內，zoom transform 只套這層
  const mapGroup = svg.append('g').attr('id', 'mapGroup');

  mapGroup.selectAll('.town-path')
    .data(geo.features)
    .join('path')
    .attr('class', 'town-path')
    .attr('d', d => path(d) || '')
    .attr('fill', d => {
      const key = normGeo(d.properties.COUNTYNAME, d.properties.TOWNNAME);
      const { count, score, max, hasVisit, visitedCount } = townStats(key);
      if (count > 0 && hasVisit) visitedTowns++;
      if (count > 0 && visitedCount === count) fullTowns++;
      return getFill(count, score, max);
    })
    // ── 桌機：hover tooltip ──────────────────────────────────────────────────
    .on('mousemove', function(event, d) {
      if (isMobile) return;
      const key = normGeo(d.properties.COUNTYNAME, d.properties.TOWNNAME);
      const { count, visitedCount } = townStats(key);
      const pct = count > 0 ? Math.round(visitedCount / count * 100) : 0;
      document.getElementById('ttName').textContent =
        d.properties.COUNTYNAME + ' ' + d.properties.TOWNNAME;
      document.getElementById('ttShops').textContent =
        count > 0 ? `拉麵店 ${count} 間` : '本區無拉麵店資料';
      document.getElementById('ttScore').textContent =
        count > 0 ? `踩點完成度 ${pct}%` : '';
      tip.style.display = 'block';
      tip.style.left = (event.clientX + 14) + 'px';
      tip.style.top  = (event.clientY - 10) + 'px';
    })
    .on('mouseleave', () => { if (!isMobile) tip.style.display = 'none'; })
    // ── 點擊：桌機 zoom-in / 手機 info panel ─────────────────────────────────
    .on('click', function(event, d) {
      event.stopPropagation();
      const key = normGeo(d.properties.COUNTYNAME, d.properties.TOWNNAME);
      const stats = townStats(key);
      if (isMobile) {
        showPanel(d.properties.COUNTYNAME, d.properties.TOWNNAME, stats);
        const now = Date.now();
        if (_lastTapKey === key && now - _lastTapTime < 450) zoomToFeature(d);
        _lastTapKey = key; _lastTapTime = now;
      } else {
        zoomToFeature(d);
      }
    });

  // ── D3 zoom ──────────────────────────────────────────────────────────────
  const zoom = d3.zoom()
    .scaleExtent([1, 14])
    .on('zoom', event => {
      mapGroup.attr('transform', event.transform);
      resetBtn.style.display = event.transform.k > 1.01 ? 'flex' : 'none';
    });

  svg.call(zoom);

  // SVG 背景點擊：桌機重設 / 手機關面板
  svg.on('click', () => {
    if (isMobile) closePanel();
    else resetZoom();
  });

  function zoomToFeature(d) {
    const [[x0, y0], [x1, y1]] = path.bounds(d);
    const scale = Math.min(12, 0.82 / Math.max((x1 - x0) / W, (y1 - y0) / H));
    const tx = W / 2 - scale * (x0 + x1) / 2;
    const ty = H / 2 - scale * (y0 + y1) / 2;
    svg.transition().duration(520)
      .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }

  function resetZoom() {
    svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
  }

  resetBtn.addEventListener('click', e => { e.stopPropagation(); resetZoom(); });

  // ── 手機 info panel ──────────────────────────────────────────────────────
  let _lastTapKey = '', _lastTapTime = 0;

  function showPanel(county, town, stats) {
    const { count, visitedCount } = stats;
    const pct = count > 0 ? Math.round(visitedCount / count * 100) : 0;
    document.getElementById('infoPanelName').textContent = county + ' ' + town;
    document.getElementById('infoPanelShops').textContent =
      count > 0 ? `拉麵店 ${count} 間` : '本區無拉麵店資料';
    document.getElementById('infoPanelScore').textContent =
      count > 0 ? `踩點完成度 ${pct}%` : '';
    panel.classList.add('open');
  }

  function closePanel() { panel.classList.remove('open'); }

  document.getElementById('infoPanelClose').addEventListener('click', e => {
    e.stopPropagation(); closePanel();
  });

  cb({ visitedTowns, fullTowns });
}
</script>
